<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game</title>
    <link rel="stylesheet" href="stylesheets/rock-paper-scissors.css" />
  </head>
  <body>
    <h1>Rock Paper Scissors</h1>
    <button class="move-button" onclick="playGame('rock')">
      <img class="move-icon" src="images/rock-emoji.png" />
    </button>
    <button class="move-button" onclick="playGame('paper')">
      <img class="move-icon" src="images/paper-emoji.png" />
    </button>
    <button class="move-button" onclick="playGame('scissors')">
      <img class="move-icon" src="images/scissors-emoji.png" />
    </button>

    <p class="js-result result"></p>
    <p class="js-moves moves"></p>
    <p class="js-score score"></p>

    <button onclick="resetScore()" class="reset-button">Reset Score</button>

    <script src="scripts/rock-paper-scissors.js"></script>
  </body>
</html>
