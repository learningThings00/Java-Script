<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM</title>
    <link rel="stylesheet" href="stylesheets/dom-practice.css" />
  </head>
  <body>
    <h2>YouTube Subscribe Button</h2>
    <button onclick="subscribe()" class="js-subscribe-button subscribe-button">
      Subscribe
    </button>

    <hr />

    <h2>Amazon Shipping Calculator</h2>
    <p>Orders under $40 = $10 shipping.</p>
    <p>Orders over $40 = FREE shipping.</p>
    <input
      class="js-cost cost-input"
      placeholder="Cost of item"
      onkeydown="costCalculateKeydown(event)"
    />
    <button class="js-calculate calculate-button" onclick="costCalculate()">
      Calculate
    </button>
    <!--similar to onclick, the onkeydown attribute works when any key is pressed we can set a specific key too like enter,
    clicks and keydowns => events
    onclick and onkeydown => event listeners
    some other envent listeners
    onclick = click
    onkeydown = key press
    onscroll = scrolling
    onmounseenter = hovering over
    onmouseleave = stop hovering over-->
    <p class="js-final-cost"></p>

    <hr />

    <button onclick="coinFlip('heads')">heads</button>
    <button onclick="coinFlip('tails')">tails</button>
    <p class="js-move">You chose:</p>

    <hr />
    <input
      type="text"
      class="js-name"
      placeholder="Name"
      onkeydown="nameKeydown(event)"
    />
    <button onclick="pickName()">Submit</button>
    <p class="js-display-name">Your name is:</p>

    <hr />

    <input
      type="text"
      class="js-type"
      placeholder="Type something"
      onkeyup="keyUp(event)"
    />
    <p class="js-display-type"></p>

    <hr />

    <button onclick="toggle('.js-gaming')" class="js-gaming toggle-button">
      Gaming
    </button>
    <button onclick="toggle('.js-music')" class="js-music toggle-button">
      Music
    </button>
    <button onclick="toggle('.js-tech')" class="js-tech toggle-button">
      Tech
    </button>

    <hr />

    <button
      onclick="toggle1('.js-gaming-button')"
      class="js-gaming-button toggle-button"
    >
      Gaming
    </button>
    <button
      onclick="toggle1('.js-music-button')"
      class="js-music-button toggle-button"
    >
      Music
    </button>
    <button
      onclick="toggle1('.js-tech-button')"
      class="js-tech-button toggle-button"
    >
      Tech
    </button>
    <script src="scripts/dom-practice.js"></script>
  </body>
</html>
