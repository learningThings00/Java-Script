<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arrays and loops</title>
    <style>
      body {
        background-color: #222;
        color: white;
      }
    </style>
  </head>
  <body>
    <script>
      //array is another type of value and represents list of value
      const num = [10, 20, 30];
      console.log(num);
      console.log(num[1]); //the num inside [] represent the position in the array. starts from 0 and the num is called index(i)

      //change the value in array
      num[2] = 99;
      console.log(num);

      //we can put any type of value in arr

      const arr1 = [1, "hello", true, { name: "shirt" }, [3, 5]];

      console.log(arr1);

      console.log(typeof num); //gives object
      //An array is an object (special type of object)
      console.log(Array.isArray(num)); //checks for array and give true or false .
      console.log(arr1.length); //tells the no of values in arr

      arr1.push("Good Job!"); //adds value to the array
      console.log(arr1);

      //deleting value from the arr
      arr1.splice(3, 2); //takes two values first for the starting i and second for how many values to remove
      console.log(arr1);

      //LOOPS

      let i = 1; //loop variable
      while (i <= 5) {
        //i <= 5 -- loop condition
        console.log(i); //inside {} loop body
        i++; //increment step
      } //each time we run is called iteration. here 5 iterations
      //loop creates a scope and any variable we create inside only exist inside

      //we can say for loop is shorter version of while

      console.log("for Loop");
      for (let i = 1; i <= 5; i++) {
        console.log(i);
      }

      //for loop - standard loop, when have increment, condition and variable
      //while loop - nonstandard loop, no increment

      let randNum = 0;
      while (randNum < 0.5) {
        randNum = Math.random();
        console.log(randNum);
      }

      const todoList = ["Go to dentist", "Complete Projects", "Meet Friend"];

      for (let i = 0; i < todoList.length; i++) {
        console.log(todoList[i]);
      }

      //Accumulator pattern - create a variable to store the result and loop through the array to update the result.

      const sum = [1, 3, 6, 50, 10, 20];
      let total = 0;
      for (let i = 0; i < sum.length; i++) {
        total += sum[i];
      }
      console.log(total);

      const double = [5, 6, 7];
      let doubled = [];

      for (let i = 0; i < double.length; i++) {
        doubled.push(double[i] * 2);
      }
      console.log(doubled);

      const greetings = [
        "Hello",
        "Hii",
        "Good Morning",
        "Good day",
        "Good Evening",
      ];
      const numbers = [1, 3, 5, 7, 9, 11, 13];

      const getLastValue = (array) => {
        console.log(array[array.length - 1]);
      };
      getLastValue(greetings);
      getLastValue(numbers);

      const arraySwap = (array) => {
        const first = array[0];
        const last = array[array.length - 1];
        // array.pop();
        // array.splice(0, 1);
        // array.unshift(last);
        // array.push(first);
        //instead of above code we can use below code
        array[0] = last;
        array[array.length - 1] = first;
        console.log(array);
      };
      arraySwap(greetings);
      arraySwap(numbers);

      for (let i = 0; i <= 10; i += 2) {
        console.log(i);
      }
      let n = 0;
      while (n <= 10) {
        console.log(n);
        n += 2;
      }
      console.log("count 5-0");
      for (let i = 5; i >= 0; i--) {
        console.log(i);
      }

      let o = 5;
      while (o >= 0) {
        console.log(o);
        o--;
      }

      const num1 = [2, 3, 4];
      function addOne(arr) {
        const newArr = [];
        for (let i = 0; i < arr.length; i++) {
          newArr.push(arr[i] + 1);
        }
        return newArr;
      }
      console.log(addOne(num1));
      console.log(addOne([-1, -5, 5]));

      function addNum(arr, num) {
        const newArr = [];
        for (let i = 0; i < arr.length; i++) {
          newArr.push(arr[i] + num);
        }
        return newArr;
      }
      console.log(addNum(num1, 5));
      console.log(addNum([-5, 10, 200, -100], 100));

      const sumArr = (arr1, arr2) => {
        const newArr = [];
        for (let i = 0; i < arr1.length; i++) {
          newArr.push(arr1[i] + arr2[i]);
        }
        return newArr;
      };
      console.log(sumArr(num1, [100, 200, 300]));

      function countPositive(arr) {
        let posNum = "";
        for (let i = 0; i < arr.length; i++) {
          if (arr[i] > 0) {
            posNum++;
          }
        }
        return posNum;
      }
      console.log(countPositive([-5, 4, -3, 2, 3, 2]));

      function minMax(arr) {
        const result = {
          min: "", //we can write as min: arr[0] too.
          max: "",
        };
        for (let i = 0; i < arr.length; i++) {
          const value = arr[i];

          if (value < result.min) {
            result.min = value;
          }

          if (value > result.max) {
            result.max = value;
          }
        }

        return result;
      }
      console.log(minMax([-5, 5, -7, 9, -10, 10, 50]));
      console.log(minMax([0, 5, 10, -1000, 200, 100, 300, 100]));
      console.log(minMax([]));
      console.log(minMax([3])); //code broke

      const updateMinMax = (arr) => {
        const result = {
          min: null,
          max: null,
        };
        for (let i = 0; i < arr.length; i++) {
          const value = arr[i];

          if (result.min === null || value < result.min) {
            result.min = value;
          }

          if (result.max === null || value > result.max) {
            result.max = value;
          }
        }

        return result;
      };
      console.log(updateMinMax([]));
      console.log(updateMinMax([5]));
      console.log(updateMinMax([3, 5, -3, 10]));

      function countWords(arr) {
        const result = {};
        for (let i = 0; i < arr.length; i++) {
          const word = arr[i];

          //result[word] rearched for the word in result obj
          if (!result[word]) {
            result[word] = 1;
          } else {
            result[word]++;
          }
        }
        return result;
      }
      console.log(
        countWords([
          "apple",
          "banana",
          "apple",
          "banana",
          "apple",
          "apple",
          "grapes",
        ]),
      );
    </script>
  </body>
</html>
