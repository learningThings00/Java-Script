<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced Functions</title>
    <style>
      body {
        background-color: #222;
        color: white;
      }
    </style>
  </head>
  <body>
    <button class="js-progress-button">Start</button>
    <button class="js-cart-button">Add to Cart</button>
    <div class="js-cart-display"></div>
    <button class="js-add-button">Add</button>
    <button class="js-remove-button">Remove</button>
    <script>
      document
        .querySelector('.js-progress-button')
        .addEventListener('click', () => progress());

      document
        .querySelector('.js-cart-button')
        .addEventListener('click', () => addToCart());

      document
        .querySelector('.js-remove-button')
        .addEventListener('click', () => deleteMessage());

      //below is a onclick javaScript here instead of onclick attribute of html we use event listeners. we can also clear eventlistener and later assign new fn to it by using clearEventListener.
      document
        .querySelector('.js-add-button')
        .addEventListener('click', () => addMessage());
      //advantage of writing the code this way is that - it is easier to read, HOISTING(we can call the fn before it created of declared)
      greetings();
      function greetings() {
        console.log('hello');
      }

      /*above code is a shortcut for this code below
      var greetings = function() {
      console.log('hello');
      };
      */

      greetings(); //calling the function

      //Functions are also values - we can save a function inside a variable.

      //below written function is an ANONYMOUS FUNCTION. (fn w/o name);
      const function1 = function () {
        console.log('Holaaa');
      };
      console.log(function1); //logs the value of variable and run it.
      console.log(typeof function1);
      function1();
      //hoisting doesn't work when we create the fn with variables.

      const obj1 = {
        num: 2,
        fun: function () {
          console.log('Good Morning');
        }
      };

      obj1.fun(); //this is called a method (function saved inside an object)

      function display(para) {
        console.log(para);
      }
      display(5); //passing a value into a function.

      function run(param) {
        param();
      }
      run(function () {
        console.log('this is fn inside a fn.');
      }); //passing a fn into another fn

      //the fn we passing into the fn is called a callback function

      setTimeout(function () {
        console.log('Delay 3s');
      }, 3000);
      setTimeout(function () {
        console.log('Delay 4s');
      }, 4000);

      console.log('value');

      //Asynchronous Code -  computer won't wait for a line to finish before going to next line. it runs in parallel.
      //Synchronous Code - computer will wait for a line to finish before going to next line.

      //most of the code are synchronous exept some of the features fo JavaScript like setTimeout();
      //advantage of asychronous code is it doesn't blocks our code for the given time

      setInterval(function () {
        console.log('Interval 30s');
      }, 30000);
      //this setInteval(); fn runs the code inside every 30s , it will KEEP running the fn in future.

      //Looping through an array

      [
        'Meet Friends',
        'Visit Grandma',
        'Do Exercises',
        'Learn JavaScript'
      ].forEach(function (value, index) {
        if (value === 'Do Exercises') {
          return;
        }

        console.log(index);
        console.log(value);
      });

      //forEach doesn't have continue so we use return to skip the interations.

      //if we need to exit the loop early then it's better to ued for loop using break because it is not easy to exit loop early in forEach loop.

      const add = () => {
        console.log(2 + 3);
      };

      add();
      add();

      const runTwice = (fn) => {
        fn();
        fn();
      };
      runTwice(add);

      runTwice(() => {
        console.log('12b');
      });

      const progress = () => {
        document.querySelector('.js-progress-button').innerText = 'Loading...';
        setTimeout(() => {
          document.querySelector('.js-progress-button').innerText = 'Finished!';
        }, 1000);
        setTimeout(() => {
          document.querySelector('.js-progress-button').innerText = 'Start';
        }, 3000);
      };

      let timeoutId;

      const addToCart = () => {
        document.querySelector('.js-cart-display').innerHTML = '<p>Added</p>';

        //this cancels the previous timeout and doesn't remove message quickly.

        clearTimeout(timeoutId);

        timeoutId = setTimeout(() => {
          document.querySelector('.js-cart-display').innerHTML = '';
        }, 2000);
      };

      let message = 1;

      let intervalId1;

      let isDisplayingNotification;

      const addMessage = () => {
        message++;
        displayNotification();
      };

      const deleteMessage = () => {
        if (message > 0) {
          message--;
        }
        if (message === 0) {
          stopNotification();
        }
      };

      displayNotification();

      function displayNotification() {
        if (isDisplayingNotification) {
          return;
        }

        isDisplayingNotification = true;

        intervalId1 = setInterval(() => {
          if (document.title === 'Advanced Function') {
            document.title = `(${message}) New messages`;
          } else {
            document.title = 'Advanced Function';
          }
        }, 1000);
      }

      function stopNotification() {
        isDisplayingNotification = false;

        clearInterval(intervalId1);
        document.title = 'Advanced Function';
      }

      // setInterval(() => {
      //   if (document.title === 'Advanced Functions') {
      //     document.title = `(${message})new message`;
      //   } else {
      //     document.title = 'Advanced Functions';
      //   }
      // }, 1000);

      //arrow fn

      const arrowFunction = () => {
        console.log('hello World!');
      };
      arrowFunction();
      console.log(arrowFunction);

      const greet = (greet) => {
        return greet;
      };
      console.log(greet('Namaste'));

      //shortcut for above code is
      // actually we can remover () from num parameter it is there cause of autocorrect.

      const multiple = (num) => num * 2;

      console.log(multiple(5));

      //filer method - create a new array [], if return true => put value in array, if false => doesn't put value in array

      console.log(
        [1, -3, 5, -2, 4].filter((value, index) => {
          /*
          if (value >= 0) {
            return true;
          } else {
            return false;
          }
          */
          //this line does the same thing as above code
          return value >= 0;
        })
      );

      console.log(
        [1, 3, 2, 4].map((value, i) => {
          return value * 2;
        })
      );

      console.log([1, 3, 2, 4].map((value) => value * 2));

      const multiply = (a, b) => a * b;

      console.log(multiply(2, 3));
      console.log(multiply(7, 10));

      const countPositive = (arr) => {
        let result = 0;
        arr.forEach((value) => {
          if (value > 0) {
            result++;
          }
        });
        return result;
      };

      console.log(countPositive([1, -3, 5, 5, -5, 7]));
      console.log(countPositive([-2, 3, -5, 7, 10]));

      const addNum = (arr, num) => {
        return arr.map((value) => value + num);
      };

      console.log(addNum([1, 2, 3], 2));
      console.log(addNum([-2, -1, 0, 99], 2));

      const removeEggs = (foods) => {
        return foods.filter((value) => value !== 'egg');
      };

      console.log(removeEggs(['egg', 'apple', 'egg', 'egg', 'ham']));

      const removeEgg = (foods) => {
        let count = 2;
        return foods.filter((value) => {
          if (value === 'egg' && count > 0) {
            count--;
            return false;
          }
          return true;
        });
      };

      const newArr = console.log(
        removeEgg(['egg', 'apple', 'egg', 'egg', 'ham'])
      );

      //Reduce method

      const nums = [1, 2, 3, 4, 5, 6];

      const result1 = nums.reduce(
        (acc, curr) => (curr % 2 === 1 ? acc + curr * curr : acc),
        0
      );

      console.log(result1);

      const users = [
        { name: 'A', age: 17 },
        { name: 'B', age: 22 },
        { name: 'C', age: 19 },
        { name: 'D', age: 15 }
      ];

      const result2 = users.reduce((acc, curr) => {
        if (curr.age >= 18) {
          acc.push(curr.name);
        }
        return acc;
      }, []);

      console.log(result2);

      const words = ['apple', 'banana', 'apple', 'orange', 'banana', 'apple'];

      const newObj = words.reduce((acc, curr) => {
        if (acc[curr]) {
          acc[curr]++;
        } else {
          acc[curr] = 1;
        }
        return acc;
      }, {});
      console.log(newObj);

      const orders = [
        {
          id: 1,
          amount: 100,
          status: 'completed'
        },
        {
          id: 2,
          amount: 200,
          status: 'pending'
        },
        {
          id: 3,
          amount: 300,
          status: 'completed'
        },
        {
          id: 4,
          amount: 150,
          status: 'completed'
        }
      ];

      const newObj2 = orders.reduce(
        (acc, curr) => {
          if (curr.status === 'completed') {
            acc.completedOrders.push(curr.id);
            acc.totalCompletedAmount += curr.amount;
          }
          return acc;
        },
        {
          completedOrders: [],
          totalCompletedAmount: 0
        }
      );

      console.log(newObj2);

      const newObj3 = nums.reduce(
        (acc, curr) => {
          if (curr % 2 === 0) {
            acc.even.push(curr);
          } else {
            acc.odd.push(curr);
          }
          return acc;
        },
        {
          even: [],
          odd: []
        }
      );

      console.log(newObj3);

      const data = [
        {
          category: 'food',
          amount: 100
        },
        {
          category: 'travel',
          amount: 200
        },
        {
          category: 'food',
          amount: 50
        },
        {
          category: 'rent',
          amount: 200
        }
      ];

      const newObj4 = data.reduce((acc, curr) => {
        if (!acc[curr.category]) {
          acc[curr.category] = 0;
        }
        acc[curr.category] += curr.amount;
        return acc;
      }, {});

      console.log(newObj4);

      const data1 = [
        { category: 'food', amount: 100 },
        { category: 'travel', amount: 200 },
        { category: 'food', amount: 50 },
        { category: 'travel', amount: 100 },
        { category: 'shopping', amount: 300 }
      ];

      const newObj5 = data1.reduce((acc, curr) => {
        if (!acc[curr.category]) {
          acc[curr.category] = { total: 0, count: 0 };
        }
        acc[curr.category].total += curr.amount;
        acc[curr.category].count += 1;

        return acc;
      }, {});

      console.log(newObj5);

      const newOrders = [
        { user: 'A', amount: 100 },
        { user: 'B', amount: 200 },
        { user: 'A', amount: 50 },
        { user: 'C', amount: 300 }
      ];

      const resultObj = newOrders.reduce((acc, curr) => {
        const { user, amount } = curr;

        if (!acc[user]) {
          acc[user] = 0;
        }
        acc[user] += amount;
        return acc;
      }, {});

      const finalResult = Object.entries(resultObj).map(([user, total]) => ({
        user,
        total
      }));

      console.log(resultObj);
      console.log(finalResult);

      const newUsers = [
        { name: 'A', purchases: [100, 200] },
        { name: 'B', purchases: [50] },
        { name: 'C', purchases: [300, 100, 50] }
      ];

      const purchases = newUsers.map((user) => ({
        name: user.name,
        total: user.purchases.reduce((acc, curr) => acc + curr, 0)
      }));

      const filterPurchases = purchases.filter((user) => user.total > 200);

      console.log(purchases);
      console.log(filterPurchases);

      const ageVerification = [
        { name: 'A', age: 25 },
        { name: 'B', age: 17 },
        { name: 'C', age: 30 },
        { name: 'D', age: 15 }
      ];

      console.log(
        ageVerification.filter((user) => user.age > 18).map((user) => user.name)
      );

      console.log(
        newUsers
          .filter((user) => {
            let result = 0;
            user.purchases.map((value) => (result += value));

            return result > 200;
          })
          .map((user) => user.name)
      );

      const tourData = [
        { id: 1, category: 'food' },
        { id: 2, category: 'travel' },
        { id: 3, category: 'food' }
      ];

      console.log(
        tourData.reduce((acc, curr) => {
          if (!acc[curr.category]) {
            acc[curr.category] = [];
          }
          acc[curr.category].push(curr.id);
          return acc;
        }, {})
      );

      const sqNums = [1, 2, 3, 4, 5, 6];

      console.log(
        sqNums.filter((value) => value % 2 === 0).map((value) => value * value)
      );

      console.log(nums.filter((num) => num % 2 === 1).map((num) => num * 2));

      console.log(
        words.reduce((acc, curr) => {
          if (!acc[curr]) {
            acc[curr] = 0;
          }
          acc[curr]++;
          return acc;
        }, {})
      );

      const scores1 = [
        { name: 'A', scores: [10, 20] },
        { name: 'B', scores: [5, 5] },
        { name: 'C', scores: [30, 40] }
      ];

      console.log(
        scores1
          .filter(
            (user) => user.scores.reduce((acc, curr) => acc + curr, 0) > 25
          )
          .map((user) => user.name)
      );

      console.log(
        nums.reduce(
          (acc, curr) => {
            if (curr % 2 === 0) {
              acc.evenSum += curr;
            } else {
              acc.oddSum += curr;
            }
            return acc;
          },
          {
            evenSum: 0,
            oddSum: 0
          }
        )
      );
    </script>
  </body>
</html>
