<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript</title>
  <style>
    body {
      background-color: #333;
      color: #eee;
    }

    .calculator button {
      box-sizing: border-box;
      font-size: 20px;
      width: 30px;
      height: 30px;
      background-color: #ddd;
      border: 1px solid red;
      margin-bottom: 2px;
    }
    .calculator button:hover {
      background-color: #bbb;
    }
    .calculator button:active {
      background-color: #eee;
    }
  </style>
</head>
<body>
  <h1>This is an Heading.</h1>
  <button onclick="alert('Good Job!')">Click Here</button>
  <h2>Amazon Cart Practice</h2>
  <button onclick="console.log(`Cart Quantity : ${cartQuantity}`)">Show Quantity</button>
  <button onclick="cartQuantity++; console.log(`Cart Quantity : ${cartQuantity}`)">Add to Cart</button>
  <button onclick="cartQuantity += 2; console.log(`Cart Quantity : ${cartQuantity}`)">+2</button>
  <button onclick="cartQuantity += 3; console.log(`Cart Quantity : ${cartQuantity}`)">+3</button>
  <button onclick="cartQuantity += 4; console.log(`Cart Quantity : ${cartQuantity}`)">+4
  </button>
  <button onclick="cartQuantity += 5; console.log(`Cart Quantity : ${cartQuantity}`)">+5
  </button>
  <button onclick="cartQuantity--; console.log(`Cart Quantity : ${cartQuantity}`)">Remove from Cart
  </button>
  <button onclick="cartQuantity -= 2; console.log(`Cart Quantity : ${cartQuantity}`)">-2
  </button>
  <button onclick="cartQuantity -= 3; console.log(`Cart Quantity : ${cartQuantity}`)">-3
  </button>

  <button onclick="cartQuantity = 0; console.log('Cart was reset!'); console.log(`Cart Quantity : ${cartQuantity}`)">Reset</button>

  <script src="main.js"></script>  

  <h2>Basic Calculator</h2>

  <div class="calculator">
  <button onclick="calc += '1';">1</button>
  <button onclick="calc += '2';">2</button>
  <button onclick="calc += '3';">3</button>
  <button onclick="calc += ' + ';">+</button>
  <br>
  <button onclick="calc += '4';">4</button>
  <button onclick="calc += '5';">5</button>
  <button onclick="calc += '6';">6</button>
  <button onclick="calc += ' - ';">-</button>
  <br>
  <button onclick="calc += '7';">7</button>
  <button onclick="calc += '8';">8</button>
  <button onclick="calc += '9';">9</button>
  <button onclick="calc += ' * ';">x</button>
  <br>
  <button onclick="calc = '';">C</button>
  <button onclick="calc += '0';">0</button>
  <button onclick="calc = eval(calc); console.log(calc);">=</button>
  <button onclick="calc += ' / ';">/</button>
</div>
  <h2>Rock Paper Scissor</h2>

  <button onclick="playGame('Rock');">Rock</button>
  <button onclick="playGame('Paper');">Paper</button>     
  <button onclick="playGame('Scissors')">Scissors</button>

  <h2>Amazon Cart Practice updated</h2>
  <button onclick="console.log(`Cart Quantity : ${cartQuantity}`)">Show Quantity</button>
  <button onclick="
  cartQuantity >= 10 ? alert('Cart is full') : 
  (cartQuantity++,  (cartQuantity > 10 ? cartQuantity = 10 : null), console.log(`Cart Quantity : ${cartQuantity}`));">Add to Cart</button>
  <button onclick="cartQuantity >= 10 ? alert('Cart is full') : 
  (cartQuantity += 2,  (cartQuantity > 10 ? cartQuantity = 10 : null), console.log(`Cart Quantity : ${cartQuantity}`));">+2</button>
  <button onclick="cartQuantity >= 10 ? alert('Cart is full') : 
  (cartQuantity += 3,  (cartQuantity > 10 ? cartQuantity = 10 : null), console.log(`Cart Quantity : ${cartQuantity}`));">+3</button>
  <button onclick="cartQuantity >= 10 ? alert('Cart is full') : 
  (cartQuantity += 4,  (cartQuantity > 10 ? cartQuantity = 10 : null), console.log(`Cart Quantity : ${cartQuantity}`));">+4
  </button>
  <button onclick="cartQuantity >= 10 ? alert('Cart is full') : 
  (cartQuantity += 5, (cartQuantity > 10 ? cartQuantity = 10 : null), console.log(`Cart Quantity : ${cartQuantity}`));">+5
  </button>
  <button onclick=" if (cartQuantity <= 0) {
    alert('Not enough items in Cart') 
  } else {
    cartQuantity--;
    if (cartQuantity < 0) {
      cartQuantity = 0
    }
     console.log(`Cart Quantity : ${cartQuantity}`);
  }">Remove from Cart
  </button>
  <button onclick=" if (cartQuantity <= 0) {
    alert('Not enough items in Cart') 
  } else {
    cartQuantity -= 2;
    if (cartQuantity < 0) {
      cartQuantity = 0
    }
     console.log(`Cart Quantity : ${cartQuantity}`);
  }">-2
  </button>
  <button onclick=" if (cartQuantity <= 0) {
    alert('Not enough items in Cart') 
  } else {
    cartQuantity -= 3;
    if (cartQuantity < 0) {
      cartQuantity = 0
    }
     console.log(`Cart Quantity : ${cartQuantity}`);
  }">-3
  </button>

  <button onclick="cartQuantity = 0; console.log('Cart was reset!'); console.log(`Cart Quantity : ${cartQuantity}`)">Reset</button>

</body>
</html>
