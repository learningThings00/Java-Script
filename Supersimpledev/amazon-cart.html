<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazon cart</title>
  </head>
  <body>
    <button onclick="cartUpdate(1)">Add to Cart</button>
    <button onclick="cartUpdate(2)">+2</button>
    <button onclick="cartUpdate(3)">+3</button>
    <button onclick="cartUpdate(4)">+4</button>
    <button onclick="cartUpdate(5)">+5</button>
    <button onclick="cartUpdate(-1)">Remove from Cart</button>
    <button onclick="cartUpdate(-2)">-2</button>
    <button onclick="cartUpdate(-3)">-3</button>

    <button
      onclick="
        cartQuantity = 0;
        console.log('Cart was reset!');
        localStorage.removeItem('cart');
        cartElement.innerHTML = `Cart Quantity : ${cartQuantity}`;
      "
    >
      Reset
    </button>
    <p class="js-display-cart">Cart Quantity :</p>
    <script>
      let cartQuantity = Number(localStorage.getItem("cart")) || 0;
      const cartElement = document.querySelector(".js-display-cart");

      function cartUpdate(cart) {
        cartQuantity += cart;

        if (cartQuantity > 10) {
          cartQuantity = 10;
          console.log("Cart is full");
        } else if (cartQuantity < 0) {
          cartQuantity = 0;
          console.log("No items in cart");
        }
        localStorage.setItem("cart", cartQuantity);
        cartElement.innerHTML = `Cart Quantity : ${cartQuantity}`;
      }
    </script>
  </body>
</html>
